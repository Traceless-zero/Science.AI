<section class="page-content w-full h-full overflow-y-auto">
    <div class="max-w-6xl mx-auto px-4 py-8">
        <!-- 一级视图：论坛列表页面 -->
        <div id="forum-list-view">
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                <div class="lg:col-span-1">
                    <div class="bg-white border border-gray-200 rounded-lg p-4 sticky top-4">
                        <h3 class="font-semibold mb-4 text-gray-800">论坛板块</h3>
                        <ul class="space-y-1">
                            <li><button class="w-full text-left px-3 py-2 rounded bg-blue-50 text-primary text-sm flex items-center">
                                <i class="fa fa-fire mr-2"></i>全部热议
                            </button></li>
                            <li><button class="w-full text-left px-3 py-2 rounded hover:bg-gray-50 text-gray-600 text-sm flex items-center">
                                <i class="fa fa-file-text-o mr-2"></i>论文杂谈
                            </button></li>
                            <li><button class="w-full text-left px-3 py-2 rounded hover:bg-gray-50 text-gray-600 text-sm flex items-center">
                                <i class="fa fa-users mr-2"></i>学术讨论
                            </button></li>
                            <li><button class="w-full text-left px-3 py-2 rounded hover:bg-gray-50 text-gray-600 text-sm flex items-center">
                                <i class="fa fa-coffee mr-2"></i>科研日常
                            </button></li>
                            <li><button class="w-full text-left px-3 py-2 rounded hover:bg-gray-50 text-gray-600 text-sm flex items-center">
                                <i class="fa fa-lightbulb-o mr-2"></i>脑洞区
                            </button></li>
                        </ul>
                        <button class="w-full bg-primary text-white py-2 rounded text-sm hover:bg-primary/90 mt-6">
                            <i class="fa fa-pencil mr-1"></i>发布新帖
                        </button>
                    </div>
                </div>
                <div class="lg:col-span-3 space-y-4">
                    <div class="bg-white border border-gray-200 rounded-lg p-3 flex items-center justify-between">
                        <div class="flex space-x-4 text-sm">
                            <button class="text-primary font-medium">最新</button>
                            <button class="text-gray-500 hover:text-gray-700">热门</button>
                            <button class="text-gray-500 hover:text-gray-700">精华</button>
                        </div>
                        <div class="text-sm text-gray-500">今日新帖 <span class="text-primary font-medium">128</span> 篇</div>
                    </div>
                    <!-- 帖子卡片容器，原有space-y-3不变，卡片间隔保留原有设定 -->
                    <div class="space-y-3" id="forum-card-wrap">
                        <!-- 帖子列表由 JS 渲染 -->
                    </div>
                </div>
            </div>
        </div>

        <!-- 二级视图：帖子详情页面（默认隐藏，占据完整宽度） -->
        <div id="forum-detail-view" class="hidden">
            <button onclick="closeForumDetail()" class="mb-4 text-sm text-gray-600 hover:text-primary flex items-center">
                <i class="fa fa-arrow-left mr-2"></i>返回论坛列表
            </button>
            <div id="forum-detail-container">
                <!-- JS 动态填充帖子详情内容 -->
            </div>
        </div>
    </div>
</section>
