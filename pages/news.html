<section class="page-content w-full h-full overflow-y-auto bg-gray-50" id="news-view">
    <div class="max-w-6xl mx-auto px-6 py-8 space-y-6">
        <!-- 标题区域 -->
        <div>
            <h1 class="text-[26px] font-bold text-gray-900">新闻资讯</h1>
            <p class="text-sm text-gray-500 mt-1">追踪全球学界核心进展与重要事件，精准、严谨、可溯源</p>
        </div>

        <!-- 分类筛选标签 -->
        <div class="flex flex-wrap gap-2 border border-gray-200 rounded-lg p-3 bg-white">
            <button onclick="switchNewsTab('all')" data-tab="all" class="px-4 py-1 rounded bg-blue-600 text-white text-sm hover:opacity-90">全部</button>
            <button onclick="switchNewsTab('break')" data-tab="break" class="px-4 py-1 rounded border text-sm hover:bg-gray-100">领域突破</button>
            <button onclick="switchNewsTab('experiment')" data-tab="experiment" class="px-4 py-1 rounded border text-sm hover:bg-gray-50">实验证实</button>
            <button onclick="switchNewsTab('policy')" data-tab="policy" class="px-4 py-1 rounded border text-sm hover:bg-gray-50">学术政策</button>
            <button onclick="switchNewsTab('nobel')" data-tab="nobel" class="px-4 py-1 rounded border text-sm hover:bg-gray-50">诺奖资讯</button>
            <button onclick="switchNewsTab('conference')" data-tab="conference" class="px-4 py-1 rounded border text-sm hover:bg-gray-50">学术会议</button>
        </div>

        <!-- 列表视图（原有网格卡片，ID补齐 news-list-view） -->
        <div id="news-list-view">
            <div id="news-card-wrap" class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <!-- JS动态渲染卡片 -->
            </div>
        </div>

        <!-- 详情视图（默认隐藏，补齐全部详情DOM ID） -->
        <div id="news-detail-view" class="hidden">
            <button onclick="closeNewsDetail()" class="mb-4 px-3 py-1 border rounded hover:bg-gray-100 text-sm">← 返回资讯列表</button>
            <div class="bg-white rounded-lg border p-6 space-y-5">
                <div class="flex gap-3 items-center">
                    <span id="detail-news-category" class="text-xs px-2 py-0.5 rounded bg-blue-50 text-blue-600"></span>
                    <span id="detail-news-date" class="text-xs text-gray-400"></span>
                </div>
                <h2 id="detail-news-title" class="text-2xl font-bold text-gray-900"></h2>
                <p class="text-xs text-gray-400">来源：<span id="detail-news-source"></span></p>
                <div id="detail-news-content" class="text-sm text-gray-700 leading-relaxed space-y-3"></div>
            </div>
        </div>
    </div>
</section>
