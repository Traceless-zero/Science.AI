<section class="page-content w-full h-full overflow-y-auto bg-gray-50">
    <div class="max-w-6xl mx-auto px-4 py-8">
        <!-- 一级列表视图 -->
        <div id="debate-list-view">
            <div class="mb-8">
                <h1 class="text-2xl font-bold text-dark">学术辩论</h1>
                <p class="text-gray-600 text-sm mt-1">结构化正式学术论战 · 学者实名攻防，可溯源文献论证</p>
            </div>

            <div class="bg-white border border-gray-200 rounded-lg p-4 mb-6 flex flex-wrap items-center justify-between gap-4">
                <div class="flex items-center gap-3 flex-wrap">
                    <div class="relative min-w-[260px]">
                        <i class="fa fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                        <input 
                            type="text" 
                            placeholder="检索辩题、参与学者、学科、关键词"
                            class="w-full pl-9 pr-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:border-secondary"
                        >
                    </div>
                    <select class="border border-gray-200 rounded-md px-3 py-2 text-sm text-gray-600">
                        <option>全学科</option>
                        <option>理论物理</option>
                        <option>分析哲学</option>
                        <option>社会学</option>
                    </select>
                    <select class="border border-gray-200 rounded-md px-3 py-2 text-sm text-gray-600">
                        <option>全部状态</option>
                        <option>进行中</option>
                        <option>待招募</option>
                        <option>论战归档</option>
                    </select>
                </div>
                <button class="bg-primary text-white px-4 py-2 rounded text-sm hover:bg-primary/90 flex items-center gap-2">
                    <i class="fa fa-plus"></i>发起新辩论
                </button>
            </div>

            <!-- 板块1：学术焦点 -->
            <div class="mb-8">
                <h2 class="text-base font-semibold text-gray-800 mb-4 flex items-center gap-2">
                    <i class="fa fa-fire text-amber-500"></i> 学术焦点
                </h2>
                <div id="debate-focus-card" class="bg-gradient-to-r from-blue-50 to-red-50 border border-gray-200 rounded-lg p-6 flex flex-col md:flex-row gap-6 cursor-pointer card-hover" onclick="openDebateDetail(1)">
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
                <!-- 板块2：正在交锋 -->
                <div class="lg:col-span-2">
                    <h2 class="text-base font-semibold text-gray-800 mb-4 flex items-center gap-2">
                        <i class="fa fa-comments text-blue-500"></i> 正在交锋
                    </h2>
                    <div class="space-y-4" id="debate-running-container">
                    </div>
                </div>

                <!-- 板块3：待招募辩题 -->
                <div class="lg:col-span-1">
                    <h2 class="text-base font-semibold text-gray-800 mb-4 flex items-center gap-2">
                        <i class="fa fa-bullhorn text-orange-500"></i> 待招募辩题
                    </h2>
                    <div class="space-y-3" id="debate-wait-container">
                    </div>
                </div>
            </div>

            <!-- 板块4：论战归档 -->
            <div>
                <h2 class="text-base font-semibold text-gray-800 mb-4 flex items-center gap-2">
                    <i class="fa fa-archive text-gray-500"></i> 论战归档
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="debate-archive-container">
                </div>
            </div>
        </div>

        <!-- 二级视图：辩论详情（原版固定ID，匹配你当前openDebateDetail函数） -->
        <div id="debate-detail-view" class="hidden">
            <button onclick="closeDebateDetail()" class="mb-4 text-sm text-gray-600 hover:text-primary flex items-center">
                <i class="fa fa-arrow-left mr-2"></i>返回辩论列表
            </button>

            <!-- 头部标题信息 -->
            <div class="bg-white border border-gray-200 rounded-lg p-6 mb-6">
                <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-4 mb-4">
                    <div>
                        <div class="flex items-center space-x-3 mb-2">
                            <h1 class="text-xl font-bold text-gray-900" id="debate-title"></h1>
                            <span class="text-xs px-2 py-0.5 bg-red-50 text-red-600 rounded" id="debate-status"></span>
                        </div>
                        <p class="text-gray-500 text-sm mb-3" id="debate-subtitle"></p>
                        <div class="flex flex-wrap gap-4 text-sm text-gray-500">
                            <span><i class="fa fa-users mr-1"></i> <span id="debate-scholar-count"></span> 位学者参与</span>
                            <span><i class="fa fa-eye mr-1"></i> <span id="debate-view-count"></span> 人围观</span>
                            <span><i class="fa fa-check-square-o mr-1"></i> 共 <span id="debate-round-count"></span> 轮交锋</span>
                        </div>
                    </div>
                    <div class="flex flex-shrink-0 flex-wrap gap-3">
                        <button class="border border-gray-300 text-gray-700 px-4 py-2 rounded text-sm hover:border-primary hover:text-primary transition-colors">
                            <i class="fa fa-share-alt mr-1"></i> 分享辩论
                        </button>
                        <button class="border border-gray-300 text-gray-700 px-4 py-2 rounded text-sm hover:border-primary hover:text-primary transition-colors">
                            <i class="fa fa-check-square-o mr-1"></i> 参与投票
                        </button>
                        <button class="bg-primary text-white px-4 py-2 rounded text-sm hover:bg-primary/90 transition-colors">
                            <i class="fa fa-gavel mr-1"></i> 参加辩论
                        </button>
                    </div>
                </div>

                <!-- 投票进度条 -->
                <div class="pt-4 border-t border-gray-100">
                    <div class="flex items-center justify-between text-xs text-gray-500 mb-2">
                        <span>正方（哥本哈根诠释）：<span id="debate-pro-percent"></span>%</span>
                        <span>反方（实在论立场）：<span id="debate-con-percent"></span>%</span>
                    </div>
                    <div class="w-full h-2 bg-gray-100 rounded-full overflow-hidden flex">
                        <div class="h-full bg-blue-600" id="debate-pro-bar"></div>
                        <div class="h-full bg-red-600" id="debate-con-bar"></div>
                    </div>
                </div>
            </div>

            <!-- 辩论背景 -->
            <div class="bg-white border border-gray-200 rounded-lg p-6 mb-6">
                <h2 class="text-base font-semibold mb-3">辩论背景</h2>
                <p class="text-sm text-gray-700 leading-relaxed" id="debate-background"></p>
            </div>

            <!-- 双方三等分立场模块 -->
            <div class="bg-white border border-gray-200 rounded-lg p-6 mb-6">
                <h2 class="text-base font-semibold mb-4 text-center">双方核心立场</h2>
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 items-stretch">
                    <div class="border border-blue-600/20 bg-blue-50/50 rounded-lg p-4">
                        <div class="flex items-center space-x-2 mb-3">
                            <div class="w-10 h-10 rounded-full bg-blue-600 text-white flex items-center justify-center font-medium text-sm">正</div>
                            <div>
                                <div class="font-medium text-gray-800">正方 · 哥本哈根学派</div>
                                <div class="text-xs text-gray-500" id="pro-scholars"></div>
                            </div>
                        </div>
                        <div class="text-sm text-gray-700 leading-relaxed space-y-2" id="pro-standpoint"></div>
                    </div>
                    <div class="flex items-center justify-center">
                        <div class="w-14 h-14 rounded-full bg-gray-100 border-2 border-gray-200 flex items-center justify-center font-bold text-gray-600 text-lg">VS</div>
                    </div>
                    <div class="border border-red-600/20 bg-red-50/50 rounded-lg p-4">
                        <div class="flex items-center space-x-2 justify-end lg:justify-start flex-row-reverse lg:flex-row">
                            <div class="w-10 h-10 rounded-full bg-red-600 text-white flex items-center justify-center font-medium text-sm">反</div>
                            <div class="text-right lg:text-left">
                                <div class="font-medium text-gray-800">反方 · 定域实在论</div>
                                <div class="text-xs text-gray-500" id="con-scholars"></div>
                            </div>
                        </div>
                        <div class="text-sm text-gray-700 leading-relaxed space-y-2" id="con-standpoint"></div>
                    </div>
                </div>
            </div>

            <!-- 交锋回合容器 -->
            <div class="mb-6">
                <h2 class="text-lg font-semibold text-gray-800 mb-4">核心交锋回合</h2>
                <div class="space-y-5" id="debate-round-container"></div>
            </div>

            <!-- 跳转自由论坛入口 -->
            <div class="bg-white border border-gray-200 rounded-lg p-6">
                <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                    <div>
                        <h3 class="font-medium text-gray-800 mb-1">开放讨论区</h3>
                        <p class="text-sm text-gray-500">关于本场辩论的自由讨论、延伸观点与补充发言，可跳转至自由论坛板块参与</p>
                    </div>
                    <button onclick="jumpPostFromDebate(1)" class="bg-primary text-white px-5 py-2 rounded text-sm hover:bg-primary/90 transition-colors flex-shrink-0">
                        <i class="fa fa-comments-o mr-1"></i> 前往自由论坛
                    </button>
                </div>
            </div>

            <!-- 底部声明 -->
            <div class="mt-8 text-xs text-gray-400 text-center">
                本场辩论内容基于学术史真实文献整理还原 · 所有关联论文可在期刊分区查阅
            </div>
        </div>
    </div>
</section>
