<section class="page-content w-full h-full overflow-y-auto bg-gray-50" >
    <div id="user-profile-view" class="max-w-6xl mx-auto px-4 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <!-- 左侧个人信息卡：空白容器，JS动态填充全部内容 -->
            <div class="lg:col-span-1" id="profile-left-wrap">
            </div>

            <!-- 右侧内容标签页（布局骨架保留，tab按钮加标记，面板空容器） -->
            <div class="lg:col-span-3">
                <div class="bg-white border border-gray-200 rounded-lg mb-6">
                    <div class="flex space-x-6 px-6 text-sm border-b border-gray-200 h-12 items-center">
                        <button class="profile-tab tab-active h-full px-1" data-tab="submit">我的投稿</button>
                        <button class="profile-tab text-gray-500 hover:text-gray-700 h-full px-1" data-tab="post">我的发帖</button>
                        <button class="profile-tab text-gray-500 hover:text-gray-700 h-full px-1" data-tab="debate">参与的辩论</button>
                        <button class="profile-tab text-gray-500 hover:text-gray-700 h-full px-1" data-tab="check">质检记录</button>
                        <button class="profile-tab text-gray-500 hover:text-gray-700 h-full px-1" data-tab="collect">我的收藏</button>
                    </div>
                </div>
                <div class="tab-content space-y-4" id="tab-submit"></div>
                <div class="tab-content space-y-4 hidden" id="tab-post"></div>
                <div class="tab-content space-y-4 hidden" id="tab-debate"></div>
                <div class="tab-content space-y-4 hidden" id="tab-check"></div>
                <div class="tab-content space-y-4 hidden" id="tab-collect"></div>
            </div>
        </div>
    </div>
</section>
