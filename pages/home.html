<section id="home-view" class="page-content flex w-full h-full">
    <!-- 左侧对话历史侧边栏 → 改为功能菜单 -->
    <aside id="sidebar" class="w-64 bg-sidebar border-r border-gray-200 flex flex-col flex-shrink-0 hidden md:flex">
    <!-- 顶部操作栏：搜索 + 收起 -->
    <div class="flex items-center gap-2 p-3 border-b border-gray-100">
        <div class="flex-1 relative">
            <input 
                type="text" 
                placeholder="搜索对话..." 
                class="w-full pl-8 pr-2 py-1.5 text-xs border border-gray-200 rounded-md focus:outline-none focus:border-primary bg-gray-50"
                onclick="alert('搜索历史记录功能将在后续版本实现。')"
                readonly
            >
            <i class="fa fa-search absolute left-2.5 top-1/2 -translate-y-1/2 text-xs text-gray-400"></i>
        </div>
        <button onclick="toggleSidebar()" class="w-7 h-7 flex items-center justify-center rounded-md hover:bg-gray-200 text-gray-500 transition-colors" title="收起侧边栏">
            <i class="fa fa-bars text-sm"></i>
        </button>
    </div>

    <!-- AI助手总览按钮 -->
    <div class="p-3">
        <button onclick="resetChatView()" class="w-full bg-white border border-gray-200 rounded-lg py-2.5 text-sm font-medium hover:bg-gray-50 flex items-center justify-center">
            <i class="fa fa-plus mr-2"></i>AI助手总览
        </button>
    </div>

    <!-- 功能演示列表 -->
    <div class="flex-1 overflow-y-auto scrollbar-thin px-2 pb-4" id="chat-history-container">
        <!-- 由 renderChatHistory() 动态渲染 -->
    </div>

    <!-- 底部信息 -->
    <div class="border-t border-gray-200 p-3 text-xs text-gray-500">
        <div class="flex items-center justify-between">
            <span>静态演示页面</span>
            <i class="fa fa-info-circle cursor-pointer hover:text-primary"></i>
        </div>
    </div>
</aside>

    <!-- 中间主聊天区 -->
    <div class="flex-1 flex flex-col h-full relative">
        <div id="chat-container" class="flex-1 overflow-y-auto scrollbar-thin px-4 py-6">
            <div class="max-w-3xl mx-auto space-y-6" id="chat-content-area">
                <!-- 默认：AI 欢迎消息 -->
                <div id="welcome-view">
                    <div class="flex items-start space-x-3">
                        <div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center flex-shrink-0 text-white text-xs font-bold">AI</div>
                        <div class="flex-1">
                            <div class="font-medium text-sm mb-1">Science.AI 学术助手</div>
                            <div class="bg-gray-50 rounded-2xl rounded-tl-none px-4 py-3 text-sm text-gray-700 leading-relaxed">
                                你好。我是你的学术 AI 协作者。我可以帮你完成以下工作：
                                <ul class="mt-2 space-y-1">
                                    <li>🔍 <strong>文献检索</strong>：按主题搜索跨语言学术文献</li>
                                    <li>📝 <strong>论文摘要</strong>：将长篇论文压缩为结构化知识卡片</li>
                                    <li>📚 <strong>文献综述</strong>：梳理领域研究脉络，定位研究空白</li>
                                    <li>✅ <strong>论文质检</strong>：检测论证完整性、证据基础与可证伪性</li>
                                    <li>💡 <strong>头脑风暴</strong>：拓展研究思路，提供跨领域灵感</li>
                                    <li>🎓 <strong>模拟审稿</strong>：扮演审稿人，预判可能质疑</li>
                                </ul>
                                <p class="mt-2 text-gray-500 text-xs">👈 左侧功能列表可查看完整演示。以下为静态示例展示，真实AI对话将在后续版本实现。</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 动态演示对话区（默认隐藏） -->
                <div id="demo-view" class="hidden"></div>
            </div>
        </div>

        <!-- 底部输入区（保留原样） -->
        <div class="bg-white p-4 flex-shrink-0">
            <div class="max-w-3xl mx-auto">
                <div class="flex items-center space-x-4 mb-2 text-xs">
                    <label class="flex items-center space-x-1 cursor-pointer text-primary">
                        <input type="radio" name="mode" value="chat" checked class="accent-primary">
                        <span>对话模式</span>
                    </label>
                    <label class="flex items-center space-x-1 cursor-pointer text-gray-600 hover:text-primary">
                        <input type="radio" name="mode" value="search" class="accent-primary">
                        <span>论文检索</span>
                    </label>
                    <label class="flex items-center space-x-1 cursor-pointer text-gray-600 hover:text-primary">
                        <input type="radio" name="mode" value="check" class="accent-primary">
                        <span>论证质检</span>
                    </label>
                    <div class="ml-auto text-gray-400">
                        <i class="fa fa-paperclip mr-1 cursor-pointer hover:text-primary"></i>
                        <i class="fa fa-cog ml-2 cursor-pointer hover:text-primary"></i>
                    </div>
                </div>
                <div class="relative border border-gray-300 rounded-xl focus-within:border-secondary focus-within:ring-1 focus-within:ring-secondary transition-all">
                    <textarea 
                        id="chat-input"
                        rows="2"
                        class="w-full px-4 py-3 focus:outline-none resize-none text-sm rounded-xl"
                        placeholder="此处为演示占位。真实输入功能将在后续版本实现。"
                    ></textarea>
                    <button class="absolute right-3 bottom-3 bg-gray-300 text-white w-8 h-8 rounded-lg flex items-center justify-center cursor-not-allowed">
                        <i class="fa fa-paper-plane text-xs"></i>
                    </button>
                </div>
                <div class="text-xs text-gray-400 mt-2 text-center">
                    AI 生成内容仅供参考，请自行核实与判断
                </div>
            </div>
        </div>
    </div>
</section>
