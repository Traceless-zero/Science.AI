<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Science.AI - 学术思想 AI 协作者</title>
    <!-- 外部资源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- Tailwind 配置 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1e3a8a',
                        secondary: '#3b82f6',
                        sidebar: '#f8fafc',
                        dark: '#0f172a',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <!-- 自定义样式 -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-white text-gray-800 font-sans h-screen flex flex-col overflow-hidden">

    <!-- ========== 公共顶部导航 ========== -->
    <header class="bg-white border-b border-gray-200 z-50 shadow-sm flex-shrink-0">
        <div class="px-4 sm:px-6">
            <div class="flex justify-between items-center h-14">
                <!-- Logo -->
                <div class="flex items-center space-x-2">
                    <div class="w-7 h-7 bg-primary rounded flex items-center justify-center">
                        <span class="text-white font-bold text-xs">S·AI</span>
                    </div>
                    <span class="text-base font-bold text-dark">Science.AI</span>
                </div>

                <!-- 主导航 -->
                <nav class="hidden md:flex space-x-6 h-14">
                    <button  data-tab="home" class="nav-btn nav-active flex items-center px-1 text-sm">
                        <i class="fa fa-comments mr-2"></i>AI助手
                    </button>
                    <button data-tab="submission" class="nav-btn flex items-center px-1 text-gray-600 hover:text-primary text-sm">
                        <i class="fa fa-file-text-o mr-2"></i>预印本投稿
                    </button>
                    <button data-tab="forum" class="nav-btn flex items-center px-1 text-gray-600 hover:text-primary text-sm">
                        <i nav-target="forum" onclick="renderForumList()" class="fa fa-users mr-2"></i>自由论坛
                    </button>
                    <button data-tab="debate" class="nav-btn flex items-center px-1 text-gray-600 hover:text-primary text-sm">
                        <i nav-target="debate" onclick="renderDebateList()" class="fa fa-gavel mr-2"></i>学术辩论
                    </button>
                    <button data-tab="journal" class="nav-btn flex items-center px-1 text-gray-600 hover:text-primary text-sm">
                        <i class="fa fa-book mr-2"></i>期刊分区
                    </button>
                    <button data-tab="news" class="nav-btn flex items-center px-1 text-gray-600 hover:text-primary text-sm">
                        <i class="fa fa-newspaper-o mr-2"></i>新闻资讯
                    </button>
                    <button data-tab="archive" class="nav-btn flex items-center px-1 text-gray-600 hover:text-primary text-sm">
                        <i class="fa fa-archive mr-2"></i>学者归档
                    </button>
                </nav>

                <!-- 已登录用户区 -->
                <div id="user-menu-wrap" class="flex items-center space-x-4 relative">
                    <div class="flex items-center space-x-2 cursor-pointer group" onclick="toggleUserMenu()">
                        <div class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center text-sm font-medium">张</div>
                        <span class="text-sm text-gray-700 hidden sm:block">张明</span>
                        <span class="text-xs px-1.5 py-0.5 bg-blue-50 text-blue-600 rounded hidden sm:block">认证学者</span>
                        <i class="fa fa-caret-down text-gray-500 text-xs"></i>
                    </div>

                    <!-- 核心入口 -->
                    <!-- 用户下拉菜单 -->
                    <div id="user-menu" class="hidden absolute right-0 top-11 bg-white border border-gray-200 rounded-lg shadow-lg py-2 w-48 z-50">
                        <button onclick="switchTab('profile'); toggleUserMenu();" class="w-full text-left px-4 py-2.5 text-sm hover:bg-gray-50 flex items-center">
                            <i class="fa fa-user-o mr-3 text-gray-500 w-4 text-center"></i>个人中心
                        </button>
                        <button  onclick="switchTab('message'); toggleUserMenu();" class="w-full text-left px-4 py-2.5 text-sm hover:bg-gray-50 flex items-center justify-between">
                            <span class="flex items-center">
                                <i class="fa fa-bell-o mr-3 text-gray-500 w-4 text-center"></i>消息通知
                            </span>
                            <span class="text-xs bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center">3</span>
                        </button>

                        <div class="border-t border-gray-100 my-1"></div>

                        <button onclick="switchTab('about'); toggleUserMenu();" class="w-full text-left px-4 py-2.5 text-sm hover:bg-gray-50 flex items-center">
                            <i class="fa fa-cog mr-3 text-gray-500 w-4 text-center"></i>系统设置
                        </button>

                        <div class="border-t border-gray-100 my-1"></div>

                        <button class="w-full text-left px-4 py-2.5 text-sm text-red-500 hover:bg-red-50 flex items-center">
                            <i class="fa fa-sign-out mr-3 w-4 text-center"></i>退出登录
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- ========== 主内容容器（动态加载页面） ========== -->
    <main id="app-main" class="flex-1 flex overflow-hidden">
        <!-- 页面内容将通过 JS 动态插入这里 -->
    </main>

    <!-- 脚本引入（注意顺序） -->
    <script src="data/mockData.js"></script>
    <script src="js/common.js"></script>
    <script src="js/chat.js"></script>
</body>
</html>
